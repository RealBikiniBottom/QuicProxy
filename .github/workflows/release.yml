name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux x64 (musl)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}
      - run: git clone git@github.com:RealBikiniBottom/premium.git ./src/premium

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-musl-release

      - uses: taiki-e/install-action@cross

      - name: Build
        run: cross build --release --target x86_64-unknown-linux-musl

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf ../../../quicproxy-${VERSION}-linux-x64.tar.gz quicproxy

      - uses: actions/upload-artifact@v4
        with:
          name: quicproxy-${{ github.ref_name }}-linux-x64
          path: quicproxy-${{ github.ref_name }}-linux-x64.tar.gz

  build-windows:
    name: Windows x64 (MSVC, static CRT)
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: -C target-feature=+crt-static
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.PRIVATE_KEY }}
      - run: git clone git@github.com:RealBikiniBottom/premium.git ./src/premium

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-msvc-release

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify no MSVC runtime DLLs
        shell: pwsh
        run: |
          $exe = "target/x86_64-pc-windows-msvc/release/quicproxy.exe"
          if (!(Test-Path $exe)) { throw "missing exe: $exe" }
          $deps = & dumpbin /DEPENDENTS $exe | ForEach-Object { $_.ToString().Trim() } | Where-Object { $_ -ne "" }
          $forbidden = $deps | Select-String -Pattern "VCRUNTIME|MSVCP" -CaseSensitive:$false
          if ($forbidden) {
            $deps | ForEach-Object { Write-Host $_ }
            throw "found forbidden runtime dll dependency"
          }

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Flutter dependencies
        working-directory: ./src/premium/quicproxy_flutter
        run: flutter pub get

      - name: Sync core version to Flutter code
        shell: pwsh
        run: |
          $cargoToml = Get-Content "Cargo.toml" -Raw
          if ($cargoToml -match 'version\s*=\s*"([^"]+)"') {
            $version = $matches[1]
            $versionStr = "v$version"
          } else {
            throw "Failed to extract version from Cargo.toml"
          }

          $vpnServicePath = "src/premium/quicproxy_flutter/lib/services/vpn_service.dart"
          $content = Get-Content $vpnServicePath -Raw
          $updatedContent = $content -replace 'static const String currentCoreVersion = ''[^'']+'';', "static const String currentCoreVersion = '$versionStr';"
          Set-Content -Path $vpnServicePath -Value $updatedContent -NoNewline

      - name: Build Flutter Windows
        working-directory: ./src/premium/quicproxy_flutter
        run: flutter build windows

      - name: Copy Flutter build directory
        shell: pwsh
        run: |
          $sourceDir = "src/premium/quicproxy_flutter/build/windows/x64/runner/Release"
          $destDir = "quicproxy_flutter/build/windows/x64/runner/Release"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item -Path (Join-Path $sourceDir "*") -Destination $destDir -Recurse -Force

      - name: Copy core.exe to Flutter build directory
        shell: pwsh
        run: |
          $cargoToml = Get-Content "Cargo.toml" -Raw
          if ($cargoToml -match 'version\s*=\s*"([^"]+)"') {
            $version = $matches[1]
            $versionDir = "v$version"
          } else {
            throw "Failed to extract version from Cargo.toml"
          }

          $exe = "target/x86_64-pc-windows-msvc/release/quicproxy.exe"
          $destDir = "quicproxy_flutter/build/windows/x64/runner/Release/core_workspace/$versionDir"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          $dest = Join-Path $destDir "quicproxy_core.exe"
          Copy-Item -Path $exe -Destination $dest -Force

          $wintunDll = "src/premium/wintun/bin/amd64/wintun.dll"
          if (Test-Path $wintunDll) {
            Copy-Item -Path $wintunDll -Destination $destDir -Force
          } else {
            throw "missing wintun.dll: $wintunDll"
          }

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path target/x86_64-pc-windows-msvc/release/quicproxy.exe -DestinationPath quicproxy-${{ github.ref_name }}-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: quicproxy-${{ github.ref_name }}-windows-x64
          path: quicproxy-${{ github.ref_name }}-windows-x64.zip

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ./assets/windows_setup.iss

      - name: Upload Flutter Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicproxy-${{ github.ref_name }}-windows-flutter
          path: Output/QuicProxy-Windows-Setup.exe
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: quicproxy-${{ github.ref_name }}-linux-x64
          path: release-assets/linux

      - uses: actions/download-artifact@v4
        with:
          name: quicproxy-${{ github.ref_name }}-windows-x64
          path: release-assets/windows-native

      - uses: actions/download-artifact@v4
        with:
          name: quicproxy-${{ github.ref_name }}-windows-flutter
          path: release-assets/windows-flutter

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/linux/quicproxy-${{ github.ref_name }}-linux-x64.tar.gz
            release-assets/windows-native/quicproxy-${{ github.ref_name }}-windows-x64.zip
            release-assets/windows-flutter/QuicProxy-Windows-Setup.exe
          generate_release_notes: true
